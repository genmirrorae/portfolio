<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0B0B0D">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Роман Пронин</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; }

    :root {
      --blackout: #0B0B0D;
      --panel: #131316;
      --line: #26262C;
      --bone: #F2EEE6;
      --smoke: #8B8B94;
      --k3200: #FF9E2C;
      --k3200-hi: #FFD9A0;
      --k5600: #7FB4FF;
      --gel-magenta: #FF4FA3;
      --gel-green: #5BE38A;
      --gel-uv: #9B6BFF;
      --display: 'Unbounded', 'Arial Black', sans-serif;
      --body: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: var(--body);
      background: var(--blackout);
      color: var(--bone);
    }

    /* ── Page grid ── */
    .page {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 44px 64px 28px;
      position: relative;
      overflow: hidden;
    }
    /* луч 3200K — темнота, в которой включается свет; плавно следует за курсором */
    .page::before {
      content: '';
      position: absolute;
      top: var(--gy, -90px); left: var(--gx, 50%);
      transform: translate(-50%, -50%);
      width: 940px; height: 940px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,158,44,.26) 0%, rgba(255,158,44,.08) 45%, transparent 70%);
      pointer-events: none;
    }

    .name {
      font-family: var(--display);
      font-size: clamp(24px, 3.6vw, 40px);
      font-weight: 300;
      letter-spacing: -0.01em;
    }
    .role {
      margin-top: 12px;
      font-family: var(--display);
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--smoke);
    }

    /* ── Timeline scroll ── */
    .tl-scroll {
      display: flex;
      align-items: center;
      overflow-x: auto;
      overflow-y: auto;
      scrollbar-width: none;
      cursor: grab;
      user-select: none;
      min-height: 0;
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tl-scroll:active { cursor: grabbing; }
    .tl-scroll::-webkit-scrollbar { display: none; }
    .tl-scroll.raised { transform: translateY(-20px); }

    .tl-track { position: relative; flex-shrink: 0; height: 260px; }

    .tl-seg {
      position: absolute; top: 50%;
      height: 1px; background: rgba(242,238,230,.45);
      transform: translateY(-50%);
    }
    .tl-seg.gap { background: none; border-top: 1px dashed #33333B; }
    .tl-seg.cap-l::before, .tl-seg.cap-r::after {
      content: ''; position: absolute;
      top: -4px; width: 1px; height: 9px; background: rgba(242,238,230,.45);
    }
    .tl-seg.cap-l::before { left: 0; }
    .tl-seg.cap-r::after  { right: 0; }

    .yr { position: absolute; top: calc(50% + 8px); transform: translateX(-50%); }
    .yr span { font-size: 8px; letter-spacing: 0.12em; color: #4A4A52; }

    /* ── Event ── */
    .ev {
      position: absolute; top: 50%;
      transform: translateX(-50%) translateY(calc(-100px - 3.5px));
      display: flex; flex-direction: column; align-items: center;
      width: 120px;
    }
    .ev-upper, .ev-lower {
      width: 100%; height: 100px;
      display: flex; flex-direction: column; align-items: center; flex-shrink: 0;
    }
    .ev-upper { justify-content: flex-end; }
    .ev-lower { justify-content: flex-start; }
    .ev-arm { width: 1px; height: 28px; background: #2E2E36; flex-shrink: 0; }
    .ev-info { text-align: center; }
    .ev-title { font-size: 11px; font-weight: 500; line-height: 1.45; white-space: pre-line; }
    .ev-year  { font-size: 9px; color: var(--smoke); letter-spacing: 0.08em; margin-top: 3px; }
    .ev-tag {
      display: inline-block; font-size: 7.5px; letter-spacing: 0.12em;
      text-transform: uppercase; border: 1px solid var(--line); color: var(--smoke);
      border-radius: 2px; padding: 1px 5px; margin-top: 4px;
    }
    /* рубрики = источники света: один тип — один источник */
    .ev-tag.project    { border-color: rgba(255,158,44,.5);  color: var(--k3200); }
    .ev-tag.exhibition { border-color: rgba(127,180,255,.5); color: var(--k5600); }
    .ev-tag.art        { border-color: rgba(255,79,163,.5);  color: var(--gel-magenta); }
    .ev-tag.diploma    { border-color: rgba(155,107,255,.5); color: var(--gel-uv); }
    .ev-tag.milestone  { border-color: rgba(242,238,230,.5); color: var(--bone); }

    .ev-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--bone); flex-shrink: 0;
      transition: transform 0.2s ease;
    }
    .ev.t-project .ev-dot    { background: var(--k3200);       box-shadow: 0 0 12px 2px rgba(255,158,44,.45); }
    .ev.t-exhibition .ev-dot { background: var(--k5600);       box-shadow: 0 0 12px 2px rgba(127,180,255,.4); }
    .ev.t-art .ev-dot        { background: var(--gel-magenta); box-shadow: 0 0 12px 2px rgba(255,79,163,.4); }
    .ev.t-diploma .ev-dot    { background: var(--gel-uv);      box-shadow: 0 0 12px 2px rgba(155,107,255,.45); }
    .ev.t-milestone .ev-dot  { background: var(--bone);        box-shadow: 0 0 10px 2px rgba(242,238,230,.35); }
    .ev:hover .ev-dot { transform: scale(2.4); }
    .ev.diploma .ev-dot { width: 9px; height: 9px; }
    .ev.diploma:hover .ev-dot { transform: scale(2.2); }
    .ev.has-media { cursor: pointer; }
    .ev.has-media:hover .ev-title {
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: #55555E;
    }

    footer {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: #55555E;
    }
    .wm { font-family: var(--display); font-weight: 300; font-size: 11px; text-transform: none; letter-spacing: 0.02em; color: var(--smoke); text-decoration: none; transition: color 0.15s; }
    .wm b { font-weight: 800; color: var(--k3200); }
    .wm:hover { color: var(--bone); }

    header { display: flex; justify-content: space-between; align-items: flex-start; }
    .wm-head { display: block; width: 440px; height: 130px; cursor: pointer; }
    .wm-head canvas {
      width: 100%; height: 100%; display: block;
      -webkit-mask-image: radial-gradient(ellipse 95% 90% at 50% 50%, #000 45%, transparent 96%);
              mask-image: radial-gradient(ellipse 95% 90% at 50% 50%, #000 45%, transparent 96%);
    }

    /* ── Panel (in-flow, grows from bottom) ── */
    #panel-wrap {
      flex-shrink: 0;
      height: 0;
      overflow: hidden;
      border-top: 1px solid transparent;
      transition: height 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                  border-top-color 0.15s 0.1s;
    }
    #panel-wrap.open {
      height: 435px;
      border-top-color: var(--line);
    }
    #panel-wrap { background: #0D0D10; }

    .panel { padding: 18px 64px; }

    .panel-head {
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .panel-title {
      font-family: var(--display);
      font-size: 16px; font-weight: 500;
      letter-spacing: 0; white-space: nowrap; line-height: 1.2;
    }
    .panel-meta {
      font-family: var(--display); font-weight: 300;
      font-size: 9px; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--smoke); margin-top: 6px;
    }
    .panel-close {
      background: none; border: none; font-size: 20px;
      color: var(--smoke); cursor: pointer; line-height: 1;
      padding: 0 0 0 20px; flex-shrink: 0; transition: color 0.15s;
    }
    .panel-close:hover { color: var(--bone); }

    /* ── Panel body: text left, media right ── */
    .panel-body {
      display: flex; gap: 28px;
      margin-top: 10px; height: 330px;
    }

    .panel-desc {
      width: 360px; flex-shrink: 0;
      font-size: 13px; line-height: 1.6; color: #C9C5BD;
      overflow-y: auto; scrollbar-width: none;
    }
    .panel-desc::-webkit-scrollbar { display: none; }

    /* ── Media strip ── */
    .panel-strip {
      flex: 1; min-width: 0;
      display: flex; gap: 10px;
      height: 100%;
      overflow-x: auto; scrollbar-width: none;
    }
    .panel-strip::-webkit-scrollbar { display: none; }

    .panel-strip img {
      height: 100%; width: auto;
      object-fit: cover; flex-shrink: 0;
      display: block; background: #101014;
      cursor: zoom-in;
      transition: opacity 0.15s;
    }
    .panel-strip img:hover { opacity: 0.88; }

    .panel-strip video {
      height: 100%; width: auto;
      max-width: 400px;
      object-fit: contain; flex-shrink: 0;
      display: block; background: #111;
    }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 300;
      display: none; align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }

    #lb-img {
      max-width: 84vw; max-height: 86vh;
      object-fit: contain; display: block;
      cursor: default;
    }
    #lb-close {
      position: absolute; top: 24px; right: 32px;
      background: none; border: none;
      font-size: 28px; color: rgba(255,255,255,0.5);
      cursor: pointer; line-height: 1; transition: color 0.15s;
    }
    #lb-close:hover { color: #fff; }

    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: none;
      font-size: 52px; line-height: 1;
      color: rgba(255,255,255,0.35);
      cursor: pointer; padding: 0 28px;
      transition: color 0.15s;
    }
    .lb-nav:hover { color: rgba(255,255,255,0.9); }
    .lb-nav[hidden] { display: none; }
    #lb-prev { left: 0; }
    #lb-next { right: 0; }

    #lb-counter {
      position: absolute; bottom: 22px; left: 50%;
      transform: translateX(-50%);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    #lb-counter[hidden] { display: none; }

    /* ── Мобильный вертикальный таймлайн ── */
    .m-tl {
      display: none;
      overflow-y: auto; min-height: 0;
      padding: 12px 0 12px 6px;
      scrollbar-width: none;
    }
    .m-tl::-webkit-scrollbar { display: none; }
    .m-track { border-left: 1px solid rgba(242,238,230,.35); margin-left: 4px; padding: 6px 0; }
    .m-ev { position: relative; padding: 13px 8px 13px 24px; }
    .m-dot {
      position: absolute; left: -4.5px; top: 17px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--bone);
    }
    .m-ev.t-project .m-dot    { background: var(--k3200);       box-shadow: 0 0 10px 2px rgba(255,158,44,.45); }
    .m-ev.t-exhibition .m-dot { background: var(--k5600);       box-shadow: 0 0 10px 2px rgba(127,180,255,.4); }
    .m-ev.t-art .m-dot        { background: var(--gel-magenta); box-shadow: 0 0 10px 2px rgba(255,79,163,.4); }
    .m-ev.t-diploma .m-dot    { background: var(--gel-uv);      box-shadow: 0 0 10px 2px rgba(155,107,255,.45); }
    .m-ev.t-milestone .m-dot  { background: var(--bone);        box-shadow: 0 0 8px 2px rgba(242,238,230,.35); }
    .m-title { font-size: 14px; font-weight: 500; line-height: 1.35; }
    .m-meta  { font-size: 10px; color: var(--smoke); margin-top: 3px; letter-spacing: 0.08em; text-transform: uppercase; }
    .m-tag.project    { color: var(--k3200); }
    .m-tag.exhibition { color: var(--k5600); }
    .m-tag.art        { color: var(--gel-magenta); }
    .m-tag.diploma    { color: var(--gel-uv); }
    .m-tag.milestone  { color: var(--bone); }
    .m-ev.has-content { cursor: pointer; }
    .m-ev.has-content:active { background: rgba(255,255,255,.04); border-radius: 6px; }

    .sheet-handle {
      display: none;
      width: 42px; height: 4px; border-radius: 2px;
      background: #33333B; margin: 4px auto 14px;
    }

    /* низкие окна на десктопе: панель не выше 62% окна, контент скроллится внутри */
    @media (min-width: 769px) and (max-height: 800px) {
      #panel-wrap.open { height: min(435px, 62vh); }
      .panel { height: 100%; overflow-y: auto; scrollbar-width: none; }
      .panel::-webkit-scrollbar { display: none; }
    }

    @media (max-width: 768px) {
      .page { padding: 24px 20px 14px; }
      /* мобильный: меньше круг, до первого касания висит сверху как раньше */
      .page::before {
        width: 620px; height: 620px;
        top: var(--gy, -80px);
      }
      header { flex-direction: column; }
      .wm-head { width: 100%; height: auto; aspect-ratio: 440 / 130; margin-top: 10px; }

      .tl-scroll { display: none; }
      .m-tl { display: block; }

      /* шторка снизу */
      #panel-wrap {
        position: fixed; left: 0; right: 0; bottom: 0; z-index: 200;
        height: 85vh; height: 85dvh;
        transform: translateY(103%);
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid var(--line); border-bottom: none;
        border-radius: 20px 20px 0 0;
        overflow: hidden;
        box-shadow: 0 -20px 60px rgba(0,0,0,.55);
      }
      #panel-wrap.open {
        height: 85vh; height: 85dvh;
        transform: translateY(0);
      }
      .panel { padding: 10px 20px 30px; height: 100%; overflow-y: auto; }
      .sheet-handle { display: block; }
      .panel-title { white-space: normal; }
      .panel-body { flex-direction: column; height: auto; margin-top: 12px; }
      .panel-desc { width: 100%; overflow-y: visible; }
      .panel-strip { flex-direction: column; height: auto; margin-top: 16px; overflow-x: visible; }
      .panel-strip img { width: 100%; height: auto; }
      .panel-strip video { width: 100%; max-width: 100%; height: auto; }
    }
  </style>
</head>
<body>

<div class="page">
  <header>
    <div>
      <div class="name">Роман Пронин</div>
      <div class="role">Креативный продюсер</div>
    </div>
    <a class="wm-head" href="https://instagram.com/roman_pro" target="_blank" rel="noopener" aria-label="Instagram @roman_pro"><canvas id="wm-canvas"></canvas></a>
  </header>

  <div class="tl-scroll" id="scroll">
    <div class="tl-track" id="track"></div>
  </div>

  <div class="m-tl"><div class="m-track" id="mtrack"></div></div>

  <footer>
    <span id="range"></span>
    <a class="wm" href="https://instagram.com/roman_pro" target="_blank" rel="noopener">roman<b>_pro</b></a>

</div>

<div id="panel-wrap">
  <div class="panel">
    <div class="sheet-handle"></div>
    <div class="panel-head">
      <div>
        <div class="panel-title" id="panel-title"></div>

      </div>

    </div>
    <div class="panel-body">
      <div class="panel-desc" id="panel-desc"></div>
      <div class="panel-strip" id="panel-strip"></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close">×</button>
  <button id="lb-prev" class="lb-nav">‹</button>
  <img id="lb-img" src="" alt="">
  <button id="lb-next" class="lb-nav">›</button>
  <div id="lb-counter"></div>
</div>

/* ── Helpers ── */
const amo   = ev  => ev.year * 12 + ev.month + (ev.sub || 0);
const segPx = gap => Math.min(gap * PX_MO, COMPRESS);
const isGap = gap => gap * PX_MO > COMPRESS;

/* ── Positions ── */
const pos = [0];
for (let i = 1; i < EVENTS.length; i++)
  pos.push(pos[i - 1] + segPx(amo(EVENTS[i]) - amo(EVENTS[i - 1])));

const trackW = PAD * 2 + pos[pos.length - 1];
const track  = document.getElementById('track');
track.style.width = trackW + 'px';

/* ── Line segments ── */
for (let i = 1; i < EVENTS.length; i++) {
  const gap = amo(EVENTS[i]) - amo(EVENTS[i - 1]);
  let cls = 'tl-seg';
  if (isGap(gap))              cls += ' gap';
  if (i === 1)                 cls += ' cap-l';
  if (i === EVENTS.length - 1) cls += ' cap-r';
  const seg = document.createElement('div');
  seg.className = cls;
  seg.style.left  = (PAD + pos[i - 1]) + 'px';
  seg.style.width = (pos[i] - pos[i - 1]) + 'px';
  track.appendChild(seg);
}

/* ── Year labels ── */
function xForMo(year, month) {
  const m = year * 12 + month, amos = EVENTS.map(amo);
  if (m <= amos[0]) return PAD + pos[0];
  for (let i = 1; i < EVENTS.length; i++)
    if (m >= amos[i - 1] && m <= amos[i]) {
      const gap = amos[i] - amos[i - 1];
      return PAD + pos[i - 1] + ((m - amos[i - 1]) / gap) * segPx(gap);
    }
  return PAD + pos[pos.length - 1];
}

for (let y = EVENTS[0].year + 1; y <= EVENTS[EVENTS.length - 1].year; y++) {
  const x = xForMo(y, 1);
  if (EVENTS.some((_, i) => Math.abs(PAD + pos[i] - x) < 50)) continue;
  const el = document.createElement('div');
  el.className = 'yr'; el.style.left = x + 'px';
  el.innerHTML = `<span>${y}</span>`;
  track.appendChild(el);
}

/* ── Events ── */
const TAG = { project: 'Проект', milestone: 'Веха', diploma: 'Диплом', art: 'Арт', exhibition: 'Выставка' };

EVENTS.forEach((ev, i) => {
  const x        = PAD + pos[i];
  const above    = i % 2 === 0;
  const hasMedia   = (ev.photos && ev.photos.length) || (ev.videos && ev.videos.length);
  const hasContent = hasMedia || !!ev.desc;

  const info = `<div class="ev-info">
    <div class="ev-title">${ev.title}</div>
    <div class="ev-year">${ev.yearLabel || ev.year}</div>
    <span class="ev-tag ${ev.type}">${TAG[ev.type]}</span>
  </div>`;

  const node = document.createElement('div');
  let cls = 'ev t-' + ev.type;
  if (ev.type === 'diploma') cls += ' diploma';
  if (hasContent)            cls += ' has-media';
  node.className  = cls;
  node.style.left = x + 'px';
  node.innerHTML  = `
    <div class="ev-upper">${above ? info + '<div class="ev-arm"></div>' : ''}</div>
    <div class="ev-dot"></div>
    <div class="ev-lower">${above ? '' : '<div class="ev-arm"></div>' + info}</div>
  `;

  if (hasContent) {
    node.addEventListener('click', e => {
      e.stopPropagation(); // don't bubble to the close-on-click listener
      openPanel(ev);
    });
  }
  track.appendChild(node);
});

/* ── Мобильный вертикальный таймлайн ── */
const mtrack = document.getElementById('mtrack');
EVENTS.forEach(ev => {
  const hasContent = ((ev.photos && ev.photos.length) || (ev.videos && ev.videos.length)) || !!ev.desc;
  const el = document.createElement('div');
  el.className = 'm-ev t-' + ev.type;
  el.innerHTML = `<div class="m-dot"></div>
    <div class="m-title">${ev.title.replace(/\n/g, ' ')}</div>
    <div class="m-meta">${ev.yearLabel || ev.year} · <span class="m-tag ${ev.type}">${TAG[ev.type]}</span></div>`;
  if (hasContent) {
    el.classList.add('has-content');
    el.addEventListener('click', e => { e.stopPropagation(); openPanel(ev); });
  }
  mtrack.appendChild(el);
});

/* ── Footer ── */
document.getElementById('range').textContent =
  `${EVENTS[0].year} — ${EVENTS[EVENTS.length - 1].year}`;

/* ── Panel ── */
const panelWrap = document.getElementById('panel-wrap');
const tlScroll  = document.getElementById('scroll');
let   panelOpen = false;

function openPanel(ev) {
  document.getElementById('panel-title').textContent = ev.title;
  document.getElementById('panel-meta').textContent  = `${ev.yearLabel || ev.year}  ·  ${TAG[ev.type]}`;
  document.getElementById('panel-desc').textContent  = ev.desc || '';

  const strip = document.getElementById('panel-strip');

  strip.querySelectorAll('video').forEach(v => { v.pause(); v.src = ''; v.load(); });

  strip.innerHTML = '';

  (ev.photos || []).forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = ev.title;
    const idx = (ev.photos || []).indexOf(src);
    img.addEventListener('click', e => { e.stopPropagation(); openLightbox(ev.photos, idx); });
    strip.appendChild(img);
  });

  (ev.videos || []).forEach(src => {
    const vid = document.createElement('video');
    vid.controls    = true;
    vid.muted       = true;
    vid.preload     = 'metadata';
    vid.playsInline = true;
    vid.src = src;
    vid.load();
    vid.addEventListener('click', e => e.stopPropagation());
    strip.appendChild(vid);
  });

  panelWrap.classList.add('open');
  tlScroll.classList.add('raised');
  panelOpen = true;
}

function closePanel() {
  if (!panelOpen) return;
  panelWrap.classList.remove('open');
  panelWrap.style.transform = '';
  tlScroll.classList.remove('raised');
  panelOpen = false;
  document.querySelectorAll('#panel-strip video').forEach(v => { v.pause(); v.src = ''; v.load(); });
}

/* ── Свайп вниз закрывает шторку (мобильный) ── */
(function () {
  const panelEl = document.querySelector('.panel');
  const isMobile = () => window.matchMedia('(max-width: 768px)').matches;
  let startY = null, dy = 0, dragging = false;

  panelEl.addEventListener('touchstart', e => {
    if (!isMobile() || !panelOpen) return;
    startY = e.touches[0].clientY;
    dy = 0; dragging = false;
  }, { passive: true });

  panelEl.addEventListener('touchmove', e => {
    if (startY === null || !isMobile() || !panelOpen) return;
    dy = e.touches[0].clientY - startY;
    if (panelEl.scrollTop <= 0 && dy > 0) {
      dragging = true;
      panelWrap.style.transition = 'none';
      panelWrap.style.transform = `translateY(${dy}px)`;
      e.preventDefault();
    }
  }, { passive: false });

  panelEl.addEventListener('touchend', () => {
    if (startY === null) return;
    panelWrap.style.transition = '';
    if (dragging && dy > 90) {
      panelWrap.style.transform = '';
      closePanel();
    } else {
      panelWrap.style.transform = '';
    }
    startY = null; dragging = false;
  });
})();

document.getElementById('panel-close').addEventListener('click', e => {
  e.stopPropagation();
  closePanel();
});

// Close panel on click anywhere outside panel and outside event dots
document.addEventListener('click', () => closePanel());

// Stop clicks inside panel from bubbling to the document listener
panelWrap.addEventListener('click', e => e.stopPropagation());

/* ── Lightbox ── */
const lightbox  = document.getElementById('lightbox');
const lbImg     = document.getElementById('lb-img');
const lbPrev    = document.getElementById('lb-prev');
const lbNext    = document.getElementById('lb-next');
const lbCounter = document.getElementById('lb-counter');
let lbPhotos = [];
let lbIndex  = 0;

function updateLightbox() {
  lbImg.src = lbPhotos[lbIndex];
  const multi = lbPhotos.length > 1;
  lbPrev.hidden    = !multi;
  lbNext.hidden    = !multi;
  lbCounter.hidden = !multi;
  if (multi) lbCounter.textContent = `${lbIndex + 1} / ${lbPhotos.length}`;
}

function openLightbox(photos, index) {
  lbPhotos = photos;
  lbIndex  = index;
  updateLightbox();
  lightbox.classList.add('open');
}

function closeLightbox() {
  lightbox.classList.remove('open');
  // panel stays open — don't call closePanel()
}

// Click on dark backdrop → close lightbox only
lightbox.addEventListener('click', e => {
  e.stopPropagation(); // prevent document listener → panel stays open
  closeLightbox();
});

// Clicks on image/buttons don't close the lightbox
lbImg.addEventListener('click',     e => e.stopPropagation());
lbPrev.addEventListener('click',    e => { e.stopPropagation(); lbIndex = (lbIndex - 1 + lbPhotos.length) % lbPhotos.length; updateLightbox(); });
lbNext.addEventListener('click',    e => { e.stopPropagation(); lbIndex = (lbIndex + 1) % lbPhotos.length; updateLightbox(); });
document.getElementById('lb-close').addEventListener('click', e => { e.stopPropagation(); closeLightbox(); });

/* ── Keyboard ── */
document.addEventListener('keydown', e => {
  if (lightbox.classList.contains('open')) {
    if (e.key === 'ArrowLeft')  { lbIndex = (lbIndex - 1 + lbPhotos.length) % lbPhotos.length; updateLightbox(); }
    if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % lbPhotos.length; updateLightbox(); }
    if (e.key === 'Escape')     closeLightbox();
    return;
  }
  if (e.key === 'Escape') closePanel();
});

/* ── Drag-to-scroll (suppresses click after drag) ── */
const scroll = document.getElementById('scroll');
let drag = false, sx = 0, sl = 0, moved = false;

scroll.addEventListener('mousedown', e => {
  drag = true; moved = false; sx = e.pageX; sl = scroll.scrollLeft;
});
document.addEventListener('mouseup', () => { drag = false; });
scroll.addEventListener('mousemove', e => {
  if (!drag) return;
  if (Math.abs(e.pageX - sx) > 4) moved = true;
  if (moved) { e.preventDefault(); scroll.scrollLeft = sl - (e.pageX - sx); }
});
// Capture-phase: eat the click event after a drag so it doesn't open/close panels
scroll.addEventListener('click', e => { if (moved) e.stopPropagation(); }, true);

/* ── Луч 3200K плавно следует за курсором ── */
(function () {
  const page = document.querySelector('.page');
  let tx = null, ty = null;          // цель (курсор)
  let cx = null, cy = null;          // текущая позиция луча
  let glowId = null;
  const LAG = 0.035;                 // меньше — плавнее/ленивее

  function step() {
    cx += (tx - cx) * LAG;
    cy += (ty - cy) * LAG;
    page.style.setProperty('--gx', cx + 'px');
    page.style.setProperty('--gy', cy + 'px');
    if (Math.abs(tx - cx) > 0.5 || Math.abs(ty - cy) > 0.5) {
      glowId = requestAnimationFrame(step);
    } else {
      glowId = null;
    }
  }

  function follow(clientX, clientY, offsetY) {
    const r = page.getBoundingClientRect();
    tx = clientX - r.left;
    ty = clientY - r.top + offsetY;
    if (cx === null) {               // старт из исходной точки сверху по центру
      cx = r.width / 2;
      cy = -90;
    }
    if (!glowId) glowId = requestAnimationFrame(step);
  }

  document.addEventListener('mousemove', e => follow(e.clientX, e.clientY, 0), { passive: true });
  // на таче свет чуть выше пальца, чтобы его было видно
  document.addEventListener('touchmove', e => follow(e.touches[0].clientX, e.touches[0].clientY, -70), { passive: true });
  document.addEventListener('touchstart', e => follow(e.touches[0].clientX, e.touches[0].clientY, -70), { passive: true });
})();

/* ── Вордмарк roman_pro: текст из вертикальных линий, разбегающихся от курсора ── */
(function () {
  const cv  = document.getElementById('wm-canvas');
  const c   = cv.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  const CSS_W = 440, CSS_H = 130;
  const W = CSS_W * dpr, H = CSS_H * dpr;
  cv.width = W; cv.height = H;

  const FONT_SIZE   = 62 * dpr;
  const SPACING     = 4 * dpr;      // шаг вертикальных линий
  const BASE_W      = 0.35 * dpr;   // тонкая линия
  const MED_W       = 1.6 * dpr;    // зона overshoot
  const THICK_W     = 3.2 * dpr;    // внутри буквы
  const OVERSHOOT   = 9 * dpr;
  const REPEL_STR   = 16 * dpr;
  const REPEL_RAD   = 95 * dpr;
  const EASE        = 0.12;
  const EASE_BACK   = 0.05;        // возврат медленнее — шлейф гаснет как послесвечение
  const GHOSTS      = 5;           // копий среза в шлейфе
  const SAMPLE      = 2;
  const BONE        = '#F2EEE6';
  const TUNGSTEN    = '#FF9E2C';
  const TUNGSTEN_HI = '#FFD9A0';

  const off    = document.createElement('canvas');
  off.width = W; off.height = H;
  const offCtx = off.getContext('2d', { willReadFrequently: true });

  let textData = null, boundaryX = W / 2;
  let mouseX = -9e4, mouseActive = false;
  let disp = [], animId = null;

  function raster() {
    offCtx.clearRect(0, 0, W, H);
    offCtx.fillStyle = 'white';
    offCtx.textBaseline = 'middle';
    const bold = `800 ${FONT_SIZE * 0.82}px Unbounded`;
    offCtx.font = bold;
    const w1 = offCtx.measureText('roman').width;
    const w2 = offCtx.measureText('_pro').width;
    const startX = (W - (w1 + w2)) / 2, midY = H / 2;
    offCtx.fillText('roman', startX, midY);
    offCtx.fillText('_pro', startX + w1, midY);
    boundaryX = startX + offCtx.measureText('roman_').width; // «_» ещё белый, оранжевый с «pro»
    textData = offCtx.getImageData(0, 0, W, H).data;
  }

  function draw() {
    if (!textData) raster();
    c.clearRect(0, 0, W, H);

    const numLines = Math.floor(W / SPACING);
    const offsetX  = Math.floor((W - numLines * SPACING) / 2);
    const rows     = Math.ceil(H / SAMPLE);
    const osRows   = Math.ceil(OVERSHOOT / SAMPLE);
    if (disp.length !== numLines) disp = new Array(numLines).fill(0);

    c.lineCap = 'round';
    let anyMoving = false;

    for (let i = 0; i < numLines; i++) {
      const baseX = offsetX + i * SPACING + Math.floor(SPACING / 2);
      let target = 0;
      if (mouseActive) {
        const dx = baseX - mouseX, adx = Math.abs(dx);
        if (adx < REPEL_RAD) {
          const t = 1 - adx / REPEL_RAD, e = t * t * (3 - 2 * t);
          target = (dx >= 0 ? 1 : -1) * REPEL_STR * e;
        }
      }
      disp[i] += (target - disp[i]) * (target === 0 ? EASE_BACK : EASE);
      if (Math.abs(disp[i]) < 0.05 && target === 0) disp[i] = 0; else anyMoving = true;

      const x = baseX + disp[i];
      const sx = Math.min(Math.max(baseX, 0), W - 1);

      const line = (y1, y2, lw, lx = x) => {
        if (y2 - y1 <= 0) return;
        c.lineWidth = lw; c.beginPath();
        c.moveTo(lx + 0.5, y1); c.lineTo(lx + 0.5, y2); c.stroke();
      };

      // строки, где есть текст / плотный текст
      const regions = [], thicks = [];
      let inR = false, inT = false, rs = 0, ts = 0;
      for (let j = 0; j < rows; j++) {
        const sy = Math.min(j * SAMPLE, H - 1);
        const a = textData[(sy * W + sx) * 4 + 3] / 255;
        if (a > 0.05) { if (!inR) { inR = true; rs = j; } }
        else if (inR) { inR = false; regions.push([rs, j - 1]); }
        if (a > 0.4)  { if (!inT) { inT = true; ts = j; } }
        else if (inT) { inT = false; thicks.push([ts, j - 1]); }
      }
      if (inR) regions.push([rs, rows - 1]);
      if (inT) thicks.push([ts, rows - 1]);

      // шлейф: затухающие тёплые копии среза буквы между старым и новым местом
      const dmag = Math.abs(disp[i]);
      if (dmag > 1.2 * dpr && thicks.length) {
        const fade = Math.min(dmag / REPEL_STR, 1);
        for (let g = GHOSTS; g >= 1; g--) {
          const k = g / (GHOSTS + 1);            // k→1 у старого места, k→0 у буквы
          const gx = baseX + disp[i] * (1 - k);
          c.globalAlpha = fade * 0.55 * (1 - k);
          c.strokeStyle = g === 1 ? TUNGSTEN_HI : TUNGSTEN;
          for (const [a, b] of thicks)
            line(a * SAMPLE, Math.min(b * SAMPLE, H), THICK_W * (1 - 0.45 * k), gx);
        }
        c.globalAlpha = 1;
      }

      c.strokeStyle = baseX < boundaryX ? BONE : TUNGSTEN;
      line(0, H, BASE_W);
      for (const [a, b] of regions)
        line(Math.max(0, a - osRows) * SAMPLE, Math.min((b + osRows) * SAMPLE, H), MED_W);
      for (const [a, b] of thicks)
        line(a * SAMPLE, Math.min(b * SAMPLE, H), THICK_W);
    }

    animId = (anyMoving || mouseActive) ? requestAnimationFrame(draw) : null;
  }

  cv.addEventListener('mousemove', e => {
    const r = cv.getBoundingClientRect();
    mouseX = (e.clientX - r.left) * (W / r.width);
    mouseActive = true;
    if (!animId) animId = requestAnimationFrame(draw);
  }, { passive: true });
  cv.addEventListener('mouseleave', () => {
    mouseActive = false;
    if (!animId) animId = requestAnimationFrame(draw);
  });
  cv.addEventListener('touchmove', e => {
    const r = cv.getBoundingClientRect();
    mouseX = (e.touches[0].clientX - r.left) * (W / r.width);
    mouseActive = true;
    if (!animId) animId = requestAnimationFrame(draw);
  }, { passive: true });
  cv.addEventListener('touchend', () => {
    mouseActive = false;
    if (!animId) animId = requestAnimationFrame(draw);
  });

  // дорисовать после загрузки Unbounded
  draw();
  if (document.fonts) document.fonts.ready.then(() => { textData = null; draw(); });
})();
</script>

</body>
</html>
